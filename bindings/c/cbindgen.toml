# cbindgen configuration for the mce C ABI.
#
# Regenerate the committed header after changing the public FFI surface:
#
#     cbindgen --config cbindgen.toml --crate mce-c --output include/mce.h
#
# (Run from this `bindings/c/` directory. Install cbindgen with
# `cargo install cbindgen` if it is not on PATH.)

language = "C"
header = """/*
 * mce.h — C ABI for the mce chess engine.
 *
 * GENERATED by cbindgen from bindings/c/src/lib.rs. Do not edit by hand;
 * regenerate with:
 *     cbindgen --config cbindgen.toml --crate mce-c --output include/mce.h
 *
 * See the crate docs (and the doc comments below) for ownership, the two-call
 * buffer contract, and panic safety.
 */"""
include_guard = "MCE_H"
pragma_once = false
cpp_compat = true
tab_width = 4
style = "type"
documentation = true
documentation_style = "doxy"

[parse]
parse_deps = false

[export]
include = ["McePosition", "MceFairyPosition", "MceOutcome", "MceStatus"]
prefix = ""

[enum]
prefix_with_name = true
rename_variants = "ScreamingSnakeCase"

[fn]
sort_by = "None"
