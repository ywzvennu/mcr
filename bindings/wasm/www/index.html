<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>mcr-wasm demo</title>
    <style>
      :root {
        color-scheme: light dark;
        --line: #8884;
      }
      body {
        font: 15px/1.5 system-ui, sans-serif;
        margin: 0;
        padding: 1.5rem;
        max-width: 720px;
      }
      h1 {
        font-size: 1.25rem;
        margin: 0 0 0.25rem;
      }
      .sub {
        opacity: 0.7;
        margin: 0 0 1.25rem;
      }
      .row {
        display: flex;
        flex-wrap: wrap;
        gap: 0.5rem;
        align-items: center;
        margin-bottom: 0.75rem;
      }
      label {
        opacity: 0.8;
      }
      select,
      button,
      input {
        font: inherit;
        padding: 0.35rem 0.6rem;
        border: 1px solid var(--line);
        border-radius: 6px;
        background: transparent;
        color: inherit;
      }
      button {
        cursor: pointer;
      }
      button:disabled {
        opacity: 0.5;
        cursor: default;
      }
      .fen {
        font-family: ui-monospace, monospace;
        font-size: 0.85rem;
        word-break: break-all;
        padding: 0.5rem 0.6rem;
        border: 1px solid var(--line);
        border-radius: 6px;
        margin-bottom: 0.75rem;
      }
      .status {
        margin-bottom: 0.75rem;
      }
      .status .warn {
        color: #c0392b;
      }
      .moves {
        display: flex;
        flex-wrap: wrap;
        gap: 0.35rem;
        margin-bottom: 1rem;
      }
      .moves button {
        font-family: ui-monospace, monospace;
        font-size: 0.85rem;
      }
      .err {
        color: #c0392b;
        min-height: 1.2em;
      }
      h2 {
        font-size: 0.95rem;
        opacity: 0.7;
        margin: 1.25rem 0 0.4rem;
      }
    </style>
  </head>
  <body>
    <h1>mcr-wasm demo</h1>
    <p class="sub">
      The mcr chess rules library compiled to WebAssembly. Click a move to play it.
    </p>

    <div class="row">
      <label for="variant">Variant</label>
      <select id="variant">
        <option value="standard">Standard</option>
        <option value="chess960">Chess960</option>
        <option value="atomic">Atomic</option>
        <option value="antichess">Antichess</option>
        <option value="crazyhouse">Crazyhouse</option>
        <option value="kingofthehill">King of the Hill</option>
        <option value="threecheck">Three-check</option>
        <option value="racingkings">Racing Kings</option>
        <option value="horde">Horde</option>
      </select>
      <button id="reset">New game</button>
      <button id="random">Random move</button>
      <button id="undo" disabled>Undo</button>
    </div>

    <div class="fen" id="fen">…</div>
    <div class="status" id="status"></div>
    <div class="err" id="err"></div>

    <h2>Legal moves</h2>
    <div class="moves" id="moves"></div>

    <script type="module" src="./main.js"></script>
  </body>
</html>
