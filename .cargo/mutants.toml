# cargo-mutants configuration (https://mutants.rs)
#
# Mutation testing for the clean-room `mcr` library: cargo-mutants rewrites one
# expression at a time (a "mutant" — e.g. flips a `<` to `<=`, replaces a body
# with `Default::default()`) and re-runs the test suite. A mutant that the suite
# still passes ("MISSED" / survived) is a change to movegen/rules that the perft
# pins + unit tests did NOT catch — i.e. a genuinely-untested code path. A
# "CAUGHT" mutant is one the suite rejects, which is the desired outcome.
#
# The gated `mutants` CI job is ENFORCING (a surviving mutant fails the job), but
# only over the proven-clean scope below — see `examine_globs`.

# ---------------------------------------------------------------------------
# Scope: the ENFORCING subset — modules swept to ZERO surviving mutants.
# ---------------------------------------------------------------------------
# cargo-mutants rewrites one expression at a time and re-runs the suite; a
# surviving ("MISSED") mutant is a behaviour change no test caught — a genuinely
# untested code path. For the gate to be *enforcing* (`|| true` dropped in CI),
# every mutant in scope must be caught, so the examine-list is deliberately
# narrowed to the module(s) already swept survivor-free rather than all of
# `src/**` (which carries thousands of not-yet-triaged mutants).
#
# `src/board.rs` — the 8x8 piece-placement type (`Board`): occupancy masks,
# set/remove/get, FEN placement parse/serialize, and the `Display`/error
# surface. Swept with cargo-mutants 27.1.0 to 0 real survivors: of 111 mutants,
# all are caught (an infinite-loop `from_fen_placement` mutant caught by timeout,
# a stubbed `Display for ParseBoardError` by
# `board::tests::parse_board_error_display_messages`, and the `Board` `Display::fmt`
# rank-separator `>`->`>=` — which adds a trailing newline — by the
# trailing-newline pin in `board::tests::display_renders_standard_board`) or
# unviable, with the single provably-equivalent `Board::occupied` `|`->`^`
# (white|black occupancy, disjoint) excluded via `exclude_re` below.
#
# `src/position.rs` — the core `Position` type: pseudo-legal + fast pin/check-mask
# legal movegen, make/unmake, FEN parse/serialize, SEE, and the atomic/horde/
# antichess fast paths. Swept with cargo-mutants 27.1.0 to ZERO real survivors and
# folded into the enforcing scope by #445. How the coverage is achieved WITHOUT the
# integration perft suites (so the per-mutant run stays the fast `--lib` suite):
#   * In-module `#[cfg(test)]` pins cover the movegen / make-unmake / FEN / apply
#     core — reference-perft node counts (standard + variants + Chess960), the
#     make==play / unmake-restores round-trip walk, the move-clock transitions, and
#     unit tests for `is_legal`, `victim_value`, `is_insufficient_material`, the
#     staged capture/quiet split, `Undo::captured`, `move_keeps_king_safe`, and
#     en-passant SEE. The variant fast paths are covered by the in-crate
#     `variant::*` `#[cfg(test)]` suites (e.g. `variant::atomic::tests`,
#     exercising `atomic_noncapture_legal_into` / `attacked_by_nonking` /
#     `gen_pawn_pushes`) and the `variant::legal_subset_pseudo` proptest (legal ⊆
#     pseudo over nine variants, exercising `pseudo_into_with`).
#   * The `Position::see` swap-off battery is CLEARED (#496): four hand-verified
#     swap-off pins (`see_value_table_is_material_scaled`,
#     `see_bishop_xray_reveals_slider_and_ignores_offline_bishops`,
#     `see_rook_xray_battery_ignores_offline_rooks`,
#     `see_minimax_backpass_folds_the_previous_gain`), each asserting a literal SEE
#     value so a flattened `see_value` table cannot hide.
#   * The pseudo-legal generator (#445): `pseudo_into_with`'s kingless-white guard
#     is pinned by `pseudo_kingless_white_has_no_first_rank_double` (kills the
#     `&&`->`||` mutant that would route a `white_first_rank_double = false` side
#     to the horde bulk path) and `horde_bulk_pawn_path_matches_per_pawn_generator`
#     (a byte-equal parity check of `gen_horde_white_pawn_moves` against the
#     per-pawn `gen_pawn_moves(.., white_first_rank_double = true)` — which also
#     backs the equivalent-`==`->`!=` exclusion below).
#   * The residual survivors are all EITHER provably-equivalent bit-op / arithmetic
#     mutants (excluded in `exclude_re` with a per-case proof) OR mutations that
#     land in `#[cfg(not(feature = "magic"))]` slider branches that are DEAD under
#     the `--all-features` (magic) build this job uses — structurally uncatchable
#     by any test in this build, and line-excluded with justification below. Their
#     `#[cfg(feature = "magic")]` mirrors ARE in scope and caught. A second
#     no-magic mutants pass (which WOULD kill the dead branches directly) was
#     deliberately NOT added: it would double CI build cost for two role-split
#     loops the magic mirrors already pin.
# Why the test filter stays `--lib` (NOT the full integration suite): a full-suite
# baseline builds ~99 integration test binaries (~18 min cold), so a per-mutant
# integration rebuild costs minutes — hundreds of hours across the ~850-mutant
# board+position scope, which would make this scheduled job hang rather than gate.
# The fast `--lib` suite MINUS the slow geometry proptests (`-- --skip geometry`,
# ~1 s vs ~126 s) was verified to catch every real position.rs mutant, so it is
# both sufficient AND tractable. Locally the copy-based runner exhausts a RAM-backed
# `/tmp`, so TMPDIR must point at real disk; the CI job shards the scope with
# `--shard k/N` (see ci.yml) to keep each shard's wall-clock bounded.
examine_globs = [
    "src/board.rs",
    "src/position.rs",
]

# Everything not in `examine_globs` is implicitly out of scope; `exclude_globs`
# only needs to name paths that a future broadened `examine_globs` might sweep in
# but which carry no rules logic:
#   - the GPL-fenced, NON-workspace sibling crates (`compare-fairy/`, `compare/`,
#     `fuzz/`): they drive/ link GPL engines and are never published. They are
#     separate packages outside this manifest, so cargo-mutants does not mutate
#     them anyway, but they are named here so the boundary is explicit.
#   - generated/round-trip test helpers and serde glue that carry no rules logic.
exclude_globs = [
    "compare-fairy/**",
    "compare/**",
    "fuzz/**",
    "cli/**",
    "bindings/**",
    "benches/**",
    "tests/**",
    "src/geometry/notation_tests.rs",
    "src/serde_impls.rs",
]

# ---------------------------------------------------------------------------
# Equivalent-mutant exclusions (groundwork for the #445 position.rs sweep).
# ---------------------------------------------------------------------------
# cargo-mutants cannot know that a rewrite is semantically identical to the
# original, so it reports such mutants as survivors ("MISSED") that NO test can
# ever kill. The patterns below name only *provably-equivalent* mutants — each is
# `|`->`^` on two operands that share NO set bits, so their union and their
# exclusive-or are byte-identical and every downstream `.is_empty()` / `.count()`
# / membership test is unchanged. Each was individually checked against the source
# (every bitwise `|` in the named function is disjoint):
#   * Board::occupied — white-occupancy OR black-occupancy; a square holds at most
#     one color, so the two masks are disjoint. This one is in the ENFORCING
#     `src/board.rs` scope, so its exclusion is load-bearing: without it the
#     enforcing job reports this uncatchable equivalent as a survivor (it survives
#     the full `--lib` suite too — no valid board has a square of both colors).
#   * CastlingRights::from_rook_files / ::set — four rook-file nibbles (each 0..=8,
#     i.e. 4 bits) packed at disjoint shifts 0/4/8/12, and (in `set`) an
#     already-cleared 4-bit slot OR'd with a value confined to that slot.
#   * Position::attackers_to / ::attacks_from / ::see_attackers /
#     ::see_xray_attackers — attacker bitboards combined across DISJOINT
#     partitions: bishop-role vs queen-role and rook-role vs queen-role (a square
#     holds one role), White-attackers vs Black-attackers (one color per square),
#     and diagonal-ray vs orthogonal-ray attacks of one square (no square attacks
#     a target both ways at once).
#   * Position::is_insufficient_material — the pawn|rook|queen and knight|bishop
#     role unions; disjoint roles.
# A SECOND equivalence class is the swap-off overflow guard in `Position::see`:
#   * `depth + 1 >= gain.len()` (the `gain: [i32; 32]` bound) — `+`->`-` gives
#     `depth - 1 >= 32` and `+`->`*` gives `depth * 1 >= 32`. `depth` counts the
#     successive recaptures on one square, bounded by the pieces that can ever
#     bear on it — at most ~16, always < 31 — so neither the original nor either
#     mutant ever crosses the 32 threshold: the guard is unreachable defensive
#     code and the loop always exits via the `None`-attacker break instead. All
#     three variants are byte-for-byte identical in behaviour, so the two arith
#     mutants are uncatchable equivalents (the `>=`->`<` mutant on the SAME line
#     DOES fire early and is a real survivor — killed by the SEE swap-off tests,
#     NOT excluded). `depth + 1` is the sole non-compound `+` in `Position::see`,
#     so each regex names exactly that token.
# NOTE: with #445, BOTH `src/board.rs` and `src/position.rs` are in `examine_globs`,
# so every line below is now ACTIVE (load-bearing: without it the enforcing job
# reports an uncatchable equivalent — or a dead cfg'd-out mutant — as a survivor).
# The patterns are deliberately NOT function-broad where a function also has a
# NON-disjoint `|` or a real, caught token (e.g. `attacked_by_nonking`'s pawn NE|NW
# union IS a real survivor, killed by tests, not excluded; the magic-branch `&`
# masks are real and caught) — those are line-anchored so a function-broad regex
# can never silently hide them. The `|`->`&` variants are never excluded: they DO
# change behaviour and are caught.
exclude_re = [
    'replace \| with \^ in Board::occupied',
    'replace \| with \^ in CastlingRights::from_rook_files',
    'replace \| with \^ in CastlingRights::set',
    'replace \| with \^ in Position::attackers_to',
    'replace \| with \^ in Position::attacks_from',
    'replace \| with \^ in Position::see_attackers',
    'replace \| with \^ in Position::see_xray_attackers',
    'replace \| with \^ in Position::is_insufficient_material',
    'replace \+ with - in Position::see',
    'replace \+ with \* in Position::see',
    # --- #445: further provably-equivalent `|`->`^` disjoint-union survivors on
    # the position.rs pseudo/atomic/danger paths (function-broad is SAFE here —
    # every plain `|` in each named function is a union of disjoint operands, so
    # `^` == `|`; see the per-function proof block above the array):
    'replace \| with \^ in Position::atomic_noncapture_legal_into',
    'replace \| with \^ in Position::gen_slider_moves',
    # More disjoint-union `|`->`^` equivalents on the fast legal / pin / ep paths:
    #   * generate_into_with_castles — `checkers | between(king, checker)`: the
    #     single checker is an endpoint, never in the strictly-between ray, so the
    #     two are disjoint (same shape as the atomic check-mask above).
    #   * compute_pins — `rook-role | queen-role` and `bishop-role | queen-role`
    #     (a square holds one role), and `rook_pinners | bishop_pinners` (a pinner
    #     lies on exactly one king ray — orthogonal XOR diagonal — so the two
    #     pinner sets are disjoint).
    #   * ep_is_legal — the same rook|queen / bishop|queen disjoint role unions.
    # Each function's ONLY plain `|` tokens are these disjoint unions, so
    # function-broad is safe (NB: `gen_castles`/`gen_castles_960`'s `king_path |
    # rook_path` OVERLAP, so those `|`->`^` are REAL and are deliberately NOT here).
    'replace \| with \^ in Position::generate_into_with_castles',
    'replace \| with \^ in Position::compute_pins',
    'replace \| with \^ in Position::ep_is_legal',
    # attacked_by is MIXED like attacked_by_nonking — its pawn NE|NW union (lines
    # 1512/1513) is a NON-disjoint real survivor caught by tests, so only the
    # disjoint bishop|queen / rook|queen role unions are line-anchored here:
    'src/position\.rs:1524:54: replace \| with \^ in Position::attacked_by',
    'src/position\.rs:1528:50: replace \| with \^ in Position::attacked_by',
    # pseudo_into_with's kingless-side guard `white_first_rank_double && us ==
    # Color::White` (line 1101): the `==`->`!=` mutant is EQUIVALENT. The guard is
    # reached only for a kingless side to move; flipping it merely switches a
    # kingless white horde side between the bulk `gen_horde_white_pawn_moves` and
    # the per-pawn `gen_pawn_moves(.., white_first_rank_double = true)` (the else
    # branch forwards the flag), which emit byte-identical move sets — pinned by
    # `horde_bulk_pawn_path_matches_per_pawn_generator`. (The `&&`->`||` mutant on
    # the SAME line IS real — it routes a `white_first_rank_double = false` side to
    # the horde path — and is caught by `pseudo_kingless_white_has_no_first_rank_double`.)
    'src/position\.rs:1101:49: replace == with != in Position::pseudo_into_with',
    # gen_pawn_pushes double-push stride `2 * forward` with `forward` ∈ {+1,-1}:
    # `2 * forward` == `2 / forward` for both values, so `*`->`/` is equivalent
    # (the `*`->`+` sibling on the same token IS real and is caught, not excluded).
    'replace \* with / in Position::gen_pawn_pushes',
    # attacked_by_nonking is MIXED — its pawn NE|NW union (lines 1479/1480) is a
    # NON-disjoint real survivor that IS caught by tests, so these two are
    # line-anchored to the disjoint role-unions only (bishop|queen, rook|queen):
    'src/position\.rs:1487:54: replace \| with \^ in Position::attacked_by_nonking',
    'src/position\.rs:1491:50: replace \| with \^ in Position::attacked_by_nonking',
    # --- #445: `#[cfg(not(feature = "magic"))]` slider branches, DEAD under the
    # `--all-features` (magic) build the enforcing job uses: the mutated tokens
    # are cfg'd out, so every such mutant compiles to a byte-identical binary and
    # is structurally uncatchable by ANY test in this build. Their `#[cfg(feature
    # = "magic")]` mirrors (same role-split emit logic) ARE in scope and caught.
    # Line-anchored because each function ALSO has real, caught `&`/`|=` tokens in
    # its magic branch that a function-broad regex would wrongly hide; a line
    # drift merely re-surfaces the dead mutant as a survivor and reddens the gate
    # (self-correcting), it cannot silently weaken it.
    'src/position\.rs:1410:29: replace \|= with &= in Position::atomic_noncapture_legal_into',
    'src/position\.rs:1413:29: replace \|= with &= in Position::atomic_noncapture_legal_into',
    'src/position\.rs:1415:\d+: replace & with [|^] in Position::atomic_noncapture_legal_into',
    'src/position\.rs:2052:29: replace \|= with &= in Position::gen_slider_moves',
    'src/position\.rs:2055:29: replace \|= with &= in Position::gen_slider_moves',
    'src/position\.rs:2057:\d+: replace & with [|^] in Position::gen_slider_moves',
    'src/position\.rs:2057:41: delete ! in Position::gen_slider_moves',
]

# ---------------------------------------------------------------------------
# Test run per mutant: the fast LIB unit tests only.
# ---------------------------------------------------------------------------
# cargo-mutants re-runs `cargo test` for every mutant. The enforcing scope
# (`src/board.rs` + `src/position.rs`) is exercised entirely by the crate's
# in-module `#[cfg(test)]` unit tests — the board/position pins AND the
# `variant::*::tests` + `variant::legal_subset_pseudo` suites that drive the
# atomic/horde/antichess fast paths and the pseudo-legal generator — so the run is
# restricted to the library target (`--lib`), skipping the ~99 integration test
# binaries. It ALSO skips the `geometry` module's tests (`-- --skip geometry`):
# those are exhaustive attack-table proptests that take ~126 s (vs ~1 s for the
# rest of the lib suite) and cover no board/position rules logic, so excluding
# them keeps each per-mutant run about a second and the whole sweep tractable.
# Both modules were verified to reach 0 real survivors under exactly this filter.
# `--all-features` is passed so feature-gated paths (the `magic` attack table,
# `parallel`, `serde`) are also built, matching the all-features test gate.
#
# NOTE for #445: the filter stays `--lib` on PURPOSE, NOT the full non-ignored
# (integration) suite. A full-suite baseline builds every integration perft binary
# (~18 min cold), making a per-mutant integration rebuild cost minutes — hundreds
# of hours across this scope, i.e. a hung scheduled job rather than a gate. The
# `--lib` (minus geometry) suite was verified survivor-equivalent for both modules
# here, so it is both sufficient and fast. `position.rs`'s coverage was added as
# in-module / in-crate `#[cfg(test)]` pins precisely so this holds.
test_tool = "cargo"
additional_cargo_test_args = ["--all-features", "--lib", "--", "--skip", "geometry"]

# ---------------------------------------------------------------------------
# Timeouts: keep per-mutant runs bounded.
# ---------------------------------------------------------------------------
# Each mutant is tested against the fast suite; cargo-mutants auto-derives the
# timeout from the unmutated ("baseline") test time. The multiplier guards
# against a mutant that sends movegen into a (near-)infinite loop, and the
# minimum keeps fast suites from timing out on transient CI slowness. The CI job
# ALSO passes an explicit tight `--timeout` (and `--build-timeout`) so an
# infinite-loop mutant — e.g. `board.rs`'s `from_fen_placement` loop counter made
# non-advancing (`i += 1` -> `i *= 1`), or deleting a `break` in a swap-off
# `loop` — is killed by timeout in tens of seconds rather than waiting out a
# baseline-derived bound. A timeout means the mutant is CAUGHT, but cargo-mutants
# still exits 3 (distinct from 2 = MISSED) whenever any mutant times out, so the
# CI job treats exit 3 as a pass while a MISSED mutant (checked via
# `mutants.out/missed.txt`) still fails — see the `mutants` job in ci.yml.
timeout_multiplier = 3.0
minimum_test_timeout = 120
