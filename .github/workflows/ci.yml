name: CI

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # Weekly full matrix (macOS/Windows/Miri/MSRV/no_std). On pull requests only
    # the fast ubuntu `ci` gate runs, to keep Actions minutes low; the heavier
    # jobs run on push to main and on this weekly schedule.
    - cron: '0 6 * * 1'
  # Manual trigger so the heavy, schedule-gated `fairy-differential` job (which
  # builds GPL Fairy-Stockfish, ~2 min) can be run on demand without waiting for
  # the weekly cron.
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  ci:
    name: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Test
        run: cargo test --all-features

      - name: Build
        run: cargo build --all-features --examples

      # Compile the criterion benches so they cannot bit-rot, without paying for
      # an actual (slow) bench run in CI.
      - name: Benches (compile only)
        run: cargo bench --all-features --no-run

  # Rustdoc warning gate (light; on every push/PR). After #307 made
  # `cargo doc --no-deps` warning-free, this turns rustdoc warnings (broken
  # intra-doc links, invalid doc-comment markup, etc.) into hard errors so the
  # documentation debt cannot silently re-accumulate. Cheap — it is a doc build,
  # not a test run — so it stays on the fast PR path rather than the gated set.
  doc-gate:
    name: doc (rustdoc -D warnings)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Doc (deny warnings)
        env:
          RUSTDOCFLAGS: -D warnings
        run: cargo doc --no-deps --all-features

  # Supply-chain & license audit via cargo-deny. The crate is permissively
  # dual-licensed (MIT OR Apache-2.0), so this gate enforces that its entire
  # runtime/build dependency graph stays advisory-free and license-compatible
  # (permissive only — no copyleft) and is sourced only from crates.io. The
  # config lives in `deny.toml` at the repo root. The GPL-fenced compare-fairy /
  # compare and fuzz crates are non-workspace and absent from mcr's dependency
  # graph, so they are out of scope here. A single deny check is cheap (no
  # compile), so it runs on every push and PR rather than being schedule-gated.
  cargo-deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      # The action installs cargo-deny and fetches the RUSTSEC advisory DB; with
      # `[graph] all-features = true` in deny.toml the optional serde/rayon trees
      # are included in the audit.
      - name: Supply-chain & license audit (cargo-deny)
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check advisories bans licenses sources

  # no_std gate: prove the crate still compiles with the default `std` feature
  # off, both on the host and on bare-metal / wasm targets that have no standard
  # library at all. This is the regression guard for issue #113 — the core
  # geometry, rules, and (hyperbola) move generation must stay `no_std`. The
  # `std`-only paths (the `std::error::Error` impls, the `book` file loader, and
  # the magic table) are feature-gated and so are simply absent here.
  no_std:
    name: no_std
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust with no_std targets
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: thumbv7em-none-eabi, wasm32-unknown-unknown

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      # Host build with `std` off: surfaces any missing `core`/`alloc` import
      # without needing a cross target.
      - name: Build (host, --no-default-features)
        run: cargo build --no-default-features

      # Bare-metal Cortex-M: a target with no `std` crate at all, so a stray
      # `std::` reference fails to link here even if it slipped past the host.
      - name: Build (thumbv7em-none-eabi, --no-default-features)
        run: cargo build --no-default-features --target thumbv7em-none-eabi

      # wasm: a second std-less target, the primary motivation for no_std.
      - name: Build (wasm32-unknown-unknown, --no-default-features)
        run: cargo build --no-default-features --target wasm32-unknown-unknown

  # Machine-verify the no-`unsafe` guarantee: run a fast subset of the library
  # unit tests under Miri to detect undefined behaviour. The subset is the
  # low-level primitive modules (bitboards, squares, attack lookups, move
  # encoding, outcome) — exactly where UB such as out-of-bounds shifts or index
  # math would surface. The deep movegen/perft and FEN/SAN parsing tests are
  # deliberately excluded: Miri's interpreter runs them orders of magnitude
  # slower, and they exercise the same primitives this subset already covers.
  # Default features only — the optional `magic` attack table is const-built and
  # is impractically slow to evaluate under Miri (the lean tables cover the same
  # public API). This job is informational and must stay green.
  miri:
    name: miri
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install nightly Rust with Miri
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: miri

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Miri (primitive unit tests)
        run: >
          cargo +nightly miri test --lib --
          bitboard:: square:: rank:: file:: color:: piece::
          chess_move:: movelist:: attacks:: outcome::

  # Build on the declared MSRV (`rust-version` in Cargo.toml) so newer-API usage
  # that would break downstream consumers is caught early. We check `build`
  # (the consumer-facing surface) rather than `test`: the dev-dependency tree
  # (criterion -> clap_lex 1.1) pulls in an `edition = "2024"` manifest that
  # only resolves on cargo 1.85+, and dev-deps never propagate to consumers, so
  # they do not constrain the published MSRV. Full `test` runs on stable across
  # the cross-platform matrix.
  msrv:
    name: msrv (1.83)
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust 1.83
        uses: dtolnay/rust-toolchain@1.83.0

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Build (library + binaries, all features)
        run: cargo +1.83.0 build --all-features

  # Portability gate: build+test the suite on all three tier-1 platforms. The
  # deep `--include-ignored` perft sweep stays ubuntu-only (in the core `ci`
  # job's fast set / release sweeps elsewhere) so this matrix stays quick.
  cross-platform:
    name: test (${{ matrix.os }})
    if: github.event_name != 'pull_request'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --all-features

      - name: Test
        run: cargo test --all-features

  # Always-on guard for the nested, non-workspace `compare-fairy` crate. Because
  # it lives outside the workspace, root `cargo test` never builds it, so two of
  # its tests silently rotted before #219. This job builds it and runs its unit
  # tests — the FSF-free parts: FEN-dialect round-trips, divide-line parsing, and
  # pinned shallow perft counts. None of these spawn Fairy-Stockfish (FSF is only
  # ever driven by the differential binary, not the unit tests), so with no
  # `MCR_FSF_BIN` set they run fully and deterministically. Kept cheap (debug
  # build, no FSF) so it can stay on every PR and prevent the rot recurring.
  compare-fairy-unit:
    name: compare-fairy (unit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: compare-fairy

      # No MCR_FSF_BIN is exported, so every test here is FSF-free by
      # construction; the differential binary that drives FSF is exercised by the
      # gated `fairy-differential` job below.
      - name: compare-fairy unit tests (FSF-free)
        run: cargo test --manifest-path compare-fairy/Cargo.toml

  # Build + smoke-test the three consumer bindings (wasm / C / Python) and catch
  # drift. Like `compare-fairy-unit`, these crates live OUTSIDE the workspace
  # (path deps on mcr, `publish = false`, `exclude`d from the published package),
  # so the root `cargo build`/`cargo test` never touches them and they could rot
  # silently. This job is the guard against that.
  #
  # NOT gated — it runs on every push/PR (no `if:`), alongside the other
  # correctness gates (`ci`, `doc-gate`, `compare-fairy-unit`). The work is a
  # handful of debug builds of the small binding crates plus their smoke tests
  # (~a few minutes with the cargo cache warm); the cbindgen header-drift check in
  # particular is most valuable *on the PR that edits the FFI surface*, so it
  # belongs on the fast path rather than the weekly schedule. Nothing here builds
  # a heavy external oracle (unlike `fairy-differential`), so no schedule gating is
  # warranted.
  bindings:
    name: bindings (wasm/c/python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust toolchain (+ wasm32 target)
        uses: dtolnay/rust-toolchain@stable
        with:
          # wasm32-unknown-unknown is the mcr-wasm build/test target; the C and
          # Python bindings build for the host.
          targets: wasm32-unknown-unknown

      # Each binding is its own non-workspace crate with its own lockfile, so
      # cache all three keyed independently of the root workspace.
      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            bindings/wasm
            bindings/c
            bindings/python

      # Pinned to the version used to (re)generate the committed include/mcr.h so
      # the drift diff below compares like-for-like; a formatting change in a newer
      # cbindgen would otherwise show as spurious drift. Bump this in lockstep when
      # the header is regenerated with a newer cbindgen.
      - name: Install cbindgen
        uses: taiki-e/install-action@v2
        with:
          tool: cbindgen@0.29.4

      - name: Install wasm-pack
        uses: taiki-e/install-action@wasm-pack

      # -- C binding: header-drift check, then build + run the C smoke test ------
      # Regenerate the header into a temp file and diff it against the committed
      # include/mcr.h. `diff` exits non-zero on ANY difference, failing the job:
      # this is the guard that the checked-in header cannot drift from the FFI
      # surface in src/lib.rs. build_test.sh then builds libmcr.a and compiles +
      # runs test.c against it.
      - name: C — cbindgen header-drift check
        working-directory: bindings/c
        run: |
          cbindgen --config cbindgen.toml --crate mcr-c --output "$RUNNER_TEMP/mcr.h"
          if ! diff -u include/mcr.h "$RUNNER_TEMP/mcr.h"; then
            echo "::error::bindings/c/include/mcr.h is out of date." \
              "Regenerate it: cbindgen --config cbindgen.toml --crate mcr-c --output include/mcr.h"
            exit 1
          fi

      - name: C — build staticlib + run C smoke test
        run: ./bindings/c/build_test.sh

      # -- wasm binding: run tests/smoke.rs ON the wasm32 target under Node -------
      # wasm-pack compiles the crate for wasm32-unknown-unknown and runs the
      # `#[wasm_bindgen_test]`-annotated smoke tests in Node (preinstalled on the
      # runner), i.e. on the real wasm target the binding ships to.
      - name: wasm — wasm-pack test (Node)
        run: wasm-pack test --node bindings/wasm

      # -- Python binding: build the pyo3 extension and run pytest ---------------
      # `pip install` uses maturin (the build backend declared in pyproject.toml)
      # under build isolation to compile the abi3 extension and install it plus the
      # `[test]` extra (pytest); then the smoke tests import `mcr` and run.
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Python — build extension + pytest
        run: |
          pip install "./bindings/python[test]"
          pytest bindings/python/tests

  # Heavy differential + deep-perft job, GATED to the weekly schedule and manual
  # `workflow_dispatch` only (never per-PR), because it builds Fairy-Stockfish
  # from source (~2 min, GPL-3.0+) and runs the slow deep `--ignored` perft
  # sweep. FSF is GPL: it is built and driven purely AS A SUBPROCESS over a
  # process boundary (the clean-room `mcr` library never links or vendors it),
  # and the binary is never committed or cached into the repo.
  fairy-differential:
    name: fairy-differential (FSF + deep perft)
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      # Build the FSF oracle. `largeboards=yes` enables the 10x10 / large-board
      # variants (e.g. shako, grand) the differential also covers. The clone goes
      # to a throwaway `fsf/` dir that is never committed (GPL fence).
      - name: Build Fairy-Stockfish oracle (GPL, subprocess only)
        run: |
          git clone --depth 1 https://github.com/fairy-stockfish/Fairy-Stockfish.git fsf
          make -C fsf/src -j build ARCH=x86-64 largeboards=yes

      - name: Export FSF environment
        run: |
          echo "MCR_FSF_BIN=$GITHUB_WORKSPACE/fsf/src/stockfish" >> "$GITHUB_ENV"
          echo "MCR_FSF_VARIANTS_INI=$GITHUB_WORKSPACE/fsf/src/variants.ini" >> "$GITHUB_ENV"

      # Full differential: asserts mcr's perft node counts equal FSF's across the
      # shared variants. With MCR_FSF_BIN set the harness runs (rather than
      # skipping) and exits non-zero on any divergence.
      - name: compare-fairy differential vs FSF
        run: cargo run --release --manifest-path compare-fairy/Cargo.toml

      # Seeded differential fuzzer (#239): the standing regression catcher for the
      # #239-class movegen bugs (Shinobi start array, Tori drop-interposition,
      # Spartan promotion set, the Shako/Synochess cannon-aware castling king-walk).
      # Where the corpus differential above pins a fixed basket of positions, this
      # plays seeded random *legal* games from each variant's start and cross-checks
      # mcr's perft(1)/perft(2)+divide against FSF node-by-node, so a regression on a
      # reachable-but-un-pinned position surfaces here. Bounded games/plies keep each
      # game deterministic from its seed. This job is GATED (schedule /
      # workflow_dispatch only), so it does not spend per-PR CI minutes and can afford
      # a deeper budget than a per-push gate would.
      #
      # Depth/seed strategy (issue #442): the previous 3 games × 30 plies gate depth
      # missed the Empire under-generation later caught deeper (issue #359), so this
      # runs a DEEPER 12 games × 90 plies sweep (~40 s/seed across the fuzzable
      # variants, ~58k nodes). Rather than the same three fixed seeds every week, the
      # base seed **rotates with `github.run_number`** (`run_number*3 + {0,1,2}`), so
      # successive scheduled runs walk different random trajectories and accumulate
      # coverage over time while any single run stays fully reproducible from its
      # printed seeds. MCR_FSF_BIN/MCR_FSF_VARIANTS_INI are already exported above, so
      # the harness runs (rather than skipping); `main` exits non-zero on any
      # divergence and the default `bash -e` shell propagates that out of the loop, so
      # a divergence on ANY seed fails the job. Four variants (Janggi, Sittuyin,
      # Synochess, Empire) are held back from this deep sweep — each hits a documented
      # FSF *oracle* limitation, not an mcr bug, whose false divergences scale with
      # games/plies (see `difffuzz.rs::HELD_BACK`). They stay covered by the
      # fixed-corpus differential above, their `perft_*` tests, and the explicit
      # proven-clean fuzz step below.
      - name: compare-fairy differential fuzzer vs FSF (seeded, rotating)
        run: |
          run="${GITHUB_RUN_NUMBER:-0}"
          for i in 0 1 2; do
            seed=$(( run * 3 + i ))
            cargo run --release --manifest-path compare-fairy/Cargo.toml -- \
              --difffuzz --seed "$seed" --games 12 --plies 90
          done

      # Four variants are held back from the rotating sweep above (see
      # `difffuzz.rs::HELD_BACK`): each hits a documented FSF *oracle* limitation, not
      # an mcr bug — Janggi's illegal in-check pass, Sittuyin's suppressed
      # discovered-check promotion, and Synochess's / Empire's dropped
      # enemy-king-keyed castle (queenside and kingside respectively) — whose false
      # divergences scale with games/plies and cannot be reconstructed by a fixed
      # mcr-side discount. To keep the fuzz coverage the previous gate gave them, still
      # run each explicitly at the fixed depth where it is divergence-free (3 seeds ×
      # 8 games × 60 plies), reachable because `--variant` bypasses the hold-back. A
      # divergence here still fails the job. (They are additionally pinned by the
      # fixed-corpus differential above and their `perft_*` tests.)
      - name: compare-fairy differential fuzzer vs FSF (held-back variants, proven-clean depth)
        run: |
          for variant in janggi sittuyin synochess empire; do
            for seed in 1 2 3; do
              cargo run --release --manifest-path compare-fairy/Cargo.toml -- \
                --difffuzz --variant "$variant" --seed "$seed" --games 8 --plies 60
            done
          done

      # Deep geometry-layer perft sweep: the expensive `#[ignore]`d layers that
      # `cargo test` skips for speed. Run here against published reference counts so
      # the heaviest large-board positions are re-validated on every scheduled run.
      - name: Deep perft sweep (ignored tests)
        run: cargo test --release --all-features -- --include-ignored

  # Public-API breakage gate. cargo-semver-checks diffs the crate's public API
  # against a baseline and flags accidental SemVer-incompatible changes (removed
  # items, signature changes, etc.). Gated to pull_request / manual so it is
  # PR-oriented and does not burn schedule minutes.
  #
  # IMPORTANT — currently INFORMATIONAL ONLY. `mcr` is `version = "0.3.0"` but
  # `publish = false` and is not yet on crates.io (see #250), and the repo has no
  # release tags, so there is no baseline to diff against. cargo-semver-checks
  # auto-detects the crates.io baseline and will report "no baseline" here; we
  # run it with `|| true` so the report is surfaced without failing the PR. Once
  # 0.3.0 is published (or a `v*` tag exists), drop the `|| true` to make this a
  # true blocking gate — the manifest's `publish = false` is the only thing
  # standing between this and a hard check.
  semver-checks:
    name: semver-checks (informational until published)
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          # Full history so a future tag-based baseline (`--baseline-rev`) works.
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-semver-checks
        uses: taiki-e/install-action@cargo-semver-checks

      # No crates.io baseline exists yet (publish = false, no release tags), so
      # this is non-blocking. It still type-checks the crate's public surface and
      # becomes a meaningful diff the moment a baseline is available.
      - name: cargo-semver-checks (informational)
        run: cargo semver-checks --all-features || true

  # Code-coverage report with an ENFORCING line-coverage floor (issue #443).
  # cargo-llvm-cov is heavier (instrumented build + full test run), so it is
  # gated to push-to-main / schedule / manual rather than every PR, per the
  # repo's CI-minutes posture. The lcov.info artifact is uploaded for inspection.
  coverage:
    name: coverage (llvm-cov, floor)
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      # Run the instrumented suite ONCE (`--no-report`), then re-report from the
      # cached profdata for the summary+floor and the lcov artifact — so the floor
      # and the lcov export add no extra test time (the previous two `cargo llvm-cov`
      # invocations each re-ran the whole suite).
      #
      # `--fail-under-lines 88` is an ENFORCING FLOOR: the job fails if line coverage
      # drops below 88%. Baseline on 2026-07-04 was 91.65% lines (91.93% regions,
      # 92.60% functions) across the workspace, so 88 sits a few points below to catch
      # real regressions without churn. It is a RATCHET: when coverage climbs, raise
      # this number toward the current level — never lower it to make a red run pass.
      - name: Coverage (instrument once)
        run: cargo llvm-cov --all-features --workspace --no-report
      - name: Coverage summary + enforce line floor
        run: cargo llvm-cov report --summary-only --fail-under-lines 88
      - name: Coverage lcov export
        run: cargo llvm-cov report --lcov --output-path lcov.info

      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        with:
          name: lcov-coverage
          path: lcov.info
          if-no-files-found: error

  # Mutation testing (cargo-mutants) — measures whether the unit tests actually
  # CATCH breakage in the code under test. cargo-mutants rewrites one expression
  # at a time (config: `.cargo/mutants.toml`) and re-runs the test suite per
  # mutant; a surviving ("MISSED") mutant is a change the suite did not detect —
  # a genuinely-untested code path.
  #
  # GATED to the weekly schedule and manual `workflow_dispatch` only — never
  # per-PR — matching the `fairy-differential` posture, since even the scoped run
  # builds+tests once per mutant.
  #
  # ENFORCING over a proven-clean subset. `.cargo/mutants.toml` scopes the run to
  # `src/board.rs` — the 8x8 piece-placement module, swept to zero surviving
  # mutants — and runs the fast `--lib` unit suite per mutant. With that scope
  # pinned survivor-free, the `|| true` is dropped so a NEW survivor (a change to
  # `board.rs` behaviour that its unit tests fail to catch) fails the job. The
  # enforcing scope is intentionally narrow; broadening it to the movegen/rules
  # modules (`position.rs`, the geometry layer) is tracked in #445, gated on those
  # modules being swept clean and the test scope widened to the perft suites.
  mutants:
    name: mutants (cargo-mutants, enforcing on src/board.rs)
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-mutants
        uses: taiki-e/install-action@cargo-mutants

      # Reads `.cargo/mutants.toml` (scope + `--all-features --lib` test args +
      # timeouts). `--no-shuffle` keeps the report order stable; `-j 2`
      # parallelises within the runner. No `|| true`: a surviving mutant in scope
      # now fails the job. The artifact below still carries the full outcome list.
      - name: cargo-mutants (enforcing)
        run: cargo mutants --no-shuffle -j 2

      - name: Upload mutants report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: mutants-out
          path: mutants.out
          if-no-files-found: error
